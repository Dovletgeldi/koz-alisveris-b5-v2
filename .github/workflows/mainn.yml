name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup SSH agent
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

    - name: Add VPS to known hosts
      run: ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

    - name: Deploy via rsync
      run: |
        rsync -az --delete \
          --exclude='.git/' \
          --exclude='.github/' \
          --exclude='.vs/' \
          --exclude='.DS_Store' \
          --exclude='.firebase/' \
          --exclude='node_modules/' \
          --exclude='functions/' \
          --exclude='scripts/' \
          --exclude='scss/' \
          --exclude='src/' \
          --exclude='koz-react/' \
          --exclude='package.json' \
          --exclude='package-lock.json' \
          --exclude='firebase.json' \
          --exclude='.firebaserc' \
          --exclude='import-products.js' \
          --exclude='data-harytlar.js' \
          --exclude='fetch_images.py' \
          --exclude='CLAUDE.md' \
          --exclude='README.md' \
          ./ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/home/bilal/n8n-setup/site/
